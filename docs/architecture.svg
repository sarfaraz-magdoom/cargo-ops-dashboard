<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- card background (keeps it readable in GitHub light & dark themes) -->
  <rect x="0" y="0" width="1040" height="360" rx="16" fill="#FFFFFF" stroke="#E5E9F0" stroke-width="1.5"/>

  <!-- title -->
  <text x="28" y="44" font-size="21" font-weight="700" fill="#0F172A">Cargo Operations Command Centre — Data Architecture</text>
  <text x="28" y="67" font-size="12.5" fill="#64748B">SQL Server  →  Python ETL  →  Parquet  →  Power BI</text>

  <!-- ============ STAGE 1: SOURCES ============ -->
  <rect x="24" y="84" width="224" height="208" rx="12" fill="#F8FAFC" stroke="#E5E9F0" stroke-width="1.5"/>
  <circle cx="52" cy="116" r="15" fill="#1F6FEB"/>
  <text x="52" y="121" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="78" y="121" font-size="15" font-weight="700" fill="#1F6FEB">Sources</text>
  <line x1="40" y1="138" x2="232" y2="138" stroke="#E5E9F0" stroke-width="1.5"/>
  <text x="40" y="164" font-size="12.5" fill="#334155" font-weight="600">SQL Server · CargoOps</text>
  <text x="40" y="185" font-size="12" fill="#64748B">dim_carrier · dim_route</text>
  <text x="40" y="205" font-size="12" fill="#64748B">dim_date  (SQL views)</text>
  <text x="40" y="235" font-size="12.5" fill="#334155" font-weight="600">Reference CSVs</text>
  <text x="40" y="256" font-size="12" fill="#64748B">airlines · airports</text>

  <!-- arrow 1->2 -->
  <line x1="252" y1="188" x2="281" y2="188" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="267" y="178" font-size="10.5" fill="#94A3B8" text-anchor="middle">extract</text>

  <!-- ============ STAGE 2: PYTHON ETL ============ -->
  <rect x="286" y="84" width="224" height="208" rx="12" fill="#F8FAFC" stroke="#E5E9F0" stroke-width="1.5"/>
  <circle cx="314" cy="116" r="15" fill="#0EA5E9"/>
  <text x="314" y="121" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="340" y="121" font-size="15" font-weight="700" fill="#0EA5E9">Python ETL</text>
  <line x1="302" y1="138" x2="494" y2="138" stroke="#E5E9F0" stroke-width="1.5"/>
  <text x="302" y="164" font-size="12" fill="#64748B">Clean → conform</text>
  <text x="302" y="185" font-size="12" fill="#64748B">Feature engineering</text>
  <text x="302" y="206" font-size="12" fill="#64748B">delay / yield / dwell bands</text>
  <text x="302" y="236" font-size="12" fill="#334155" font-weight="600">etl_cargo_ops.ipynb</text>
  <text x="302" y="257" font-size="12" fill="#334155" font-weight="600">export_parquet.py</text>

  <!-- arrow 2->3 -->
  <line x1="514" y1="188" x2="543" y2="188" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="529" y="178" font-size="10.5" fill="#94A3B8" text-anchor="middle">write</text>

  <!-- ============ STAGE 3: PARQUET ============ -->
  <rect x="548" y="84" width="196" height="208" rx="12" fill="#F8FAFC" stroke="#E5E9F0" stroke-width="1.5"/>
  <circle cx="576" cy="116" r="15" fill="#22C55E"/>
  <text x="576" y="121" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="602" y="121" font-size="15" font-weight="700" fill="#16A34A">Parquet</text>
  <line x1="564" y1="138" x2="728" y2="138" stroke="#E5E9F0" stroke-width="1.5"/>
  <text x="564" y="164" font-size="12" fill="#334155" font-weight="600">fact_flights ~5.7M</text>
  <text x="564" y="185" font-size="12" fill="#334155" font-weight="600">fact_tonnage ~418K</text>
  <text x="564" y="206" font-size="12" fill="#334155" font-weight="600">fact_cargo_iq</text>
  <text x="564" y="236" font-size="12" fill="#64748B">columnar · compressed</text>

  <!-- arrow 3->4 -->
  <line x1="748" y1="188" x2="777" y2="188" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="763" y="178" font-size="10.5" fill="#94A3B8" text-anchor="middle">import</text>

  <!-- ============ STAGE 4: POWER BI ============ -->
  <rect x="782" y="84" width="234" height="208" rx="12" fill="#F8FAFC" stroke="#E5E9F0" stroke-width="1.5"/>
  <circle cx="810" cy="116" r="15" fill="#1F3A5F"/>
  <text x="810" y="121" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="836" y="121" font-size="15" font-weight="700" fill="#1F3A5F">Power BI</text>
  <line x1="798" y1="138" x2="1000" y2="138" stroke="#E5E9F0" stroke-width="1.5"/>
  <text x="798" y="164" font-size="12" fill="#334155" font-weight="600">Star schema (Import)</text>
  <text x="798" y="185" font-size="12" fill="#64748B">Calendar date table</text>
  <text x="798" y="206" font-size="12" fill="#64748B">71 DAX measures</text>
  <text x="798" y="236" font-size="12" fill="#334155" font-weight="600">4-page PBIR report</text>
  <text x="798" y="257" font-size="12" fill="#64748B">Overview · Revenue · OTP · Cargo iQ</text>

  <!-- footer -->
  <text x="28" y="330" font-size="11.5" fill="#94A3B8">Import-mode star schema · single-year (2015) demo data · built with pbi-cli (TMDL + PBIR)</text>
</svg>
